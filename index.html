<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Beast King</title>
<style>
body {
    background: #0a0a0a;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

#painel {
    width: 320px;
    background: #111;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 25px #ff00aa;
    border: 2px solid #ff00aa;
}

h1 {
    text-align: center;
    color: #ff00aa;
    text-shadow: 0 0 10px #ff00aa;
}

.opcao {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
}

input[type="range"] {
    width: 100%;
}

.slider-text {
    margin-top: 10px;
}

select {
    width: 100%;
    padding: 8px;
    border-radius: 10px;
    background: #222;
    color: white;
    border: none;
    margin-top: 10px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(90deg,#ff00aa,#ff4dd2);
    color: black;
    font-weight: bold;
    font-size: 18px;
    box-shadow: 0 0 15px #ff00aa;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>
<body>

<div id="painel">
    <h1>Beast-King</h1>

    <div class="opcao">
        <label>Aimbot</label>
        <input type="checkbox">
    </div>

    <div class="opcao">
        <label>ESP</label>
        <input type="checkbox">
    </div>

    <div class="opcao">
        <label>No Recoil</label>
        <input type="checkbox">
    </div>

    <div class="opcao">
        <label>Aim Lock</label>
        <input type="checkbox">
    </div>

    <div class="slider-text">Aim FOV (0-100)</div>
    <input type="range" min="0" max="100">

    <div class="slider-text">Precisão (0-100)</div>
    <input type="range" min="0" max="100">

    <div class="slider-text">Função Extra</div>
    <input type="range" min="0" max="100">

    <select>
        <option>Cabeça</option>
        <option>Pescoço</option>
        <option>Peito</option>
    </select>

    <button onclick="injetar()">INJETAR</button>
</div>

<script>
function injetar(){
    alert("Funções ativadas!");
}
</script>

</body>
</html>
